# Render.com Blueprint — HackEval
# Deploy: https://render.com/deploy?repo=https://github.com/spothineni/hackeval

services:
  - type: web
    name: hackeval
    runtime: node
    plan: free
    buildCommand: npm install && npm rebuild better-sqlite3
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
